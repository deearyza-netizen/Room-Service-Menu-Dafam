<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#16304f">
  <style>
    html {
      height: 100%;
      height: 100dvh;
    }
    body {
      height: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
    }
  </style>
  <title>Hotel Dafam Enkadeli Thamrin — Room Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e6;
      --cream-dark: #ede6d6;
      --navy: #1a3a5c;
      --navy-mid: #1e4d7a;
      --navy-dark: #16304f;
      --gold: #c8a96e;
      --gold-light: #e8d5a3;
      --gold-pale: rgba(200,169,110,0.15);
      --blue-muted: #a8c4d8;
      --text-dark: #1a2e4a;
      --text-mid: #6b7d8e;
      --text-light: #9aabb8;
      --border: #e0d8c8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--navy-dark);
    }

    #app {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 55%, var(--navy-dark) 100%);
      padding: 20px 20px 20px;
      position: relative;
      flex-shrink: 0;
      border-bottom: 2px solid var(--gold);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header-left { display: flex; flex-direction: column; }
    .header-ornament { font-size: 9px; letter-spacing: 3.5px; color: var(--gold-light); text-transform: uppercase; opacity: 0.8; margin-bottom: 3px; }
    .hotel-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #fdf8ef; line-height: 1.2; }
    .header-bottom { display: flex; align-items: center; justify-content: space-between; }
    .hotel-tagline { font-size: 12px; color: var(--blue-muted); letter-spacing: 0.8px; }
    .room-badge {
      background: var(--gold-pale);
      border: 1px solid rgba(200,169,110,0.45);
      color: var(--gold-light);
      font-size: 10px;
      letter-spacing: 1.5px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── CATEGORY TABS ── */
    .cat-tabs {
      background: var(--navy);
      padding: 10px 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      flex-shrink: 0;
      border-bottom: 1.5px solid var(--gold);
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      background: transparent;
      border: 1px solid rgba(200,169,110,0.3);
      color: var(--blue-muted);
      font-size: 11px;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.6px;
      padding: 7px 6px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      text-align: center;
    }
    .cat-tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy);
      font-weight: 700;
    }
    .cat-tab:active { transform: scale(0.95); }

    /* ── SCROLL CONTENT ── */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* ── SECTION ── */
    .section {
      display: none;
      padding: 24px 16px 20px;
      min-height: 100%;
      animation: fadeIn 0.25s ease;
    }
    .section.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--gold);
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--navy);
    }

    /* ── IMAGE ATTACHMENT BOX ── */
    .img-attach-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .img-attach-box {
      width: 100%;
      max-width: 360px;
      min-height: 260px;
      border: 2px dashed var(--gold);
      border-radius: 16px;
      background: var(--cream-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }
    .img-attach-box:active { border-color: var(--navy); background: #e8e0d0; }
    .img-attach-box.has-image { border-style: solid; border-color: var(--gold); min-height: unset; }

    /* placeholder state */
    .attach-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 20px;
      text-align: center;
      pointer-events: none;
    }
    .attach-icon {
      width: 56px; height: 56px;
      background: var(--gold-pale);
      border: 1.5px solid rgba(200,169,110,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .attach-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 0.5px;
    }
    .attach-sublabel {
      font-size: 11px;
      color: var(--text-mid);
      letter-spacing: 0.3px;
    }
    .attach-hint {
      font-size: 10px;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* preview state */
    .attach-preview {
      display: none;
      width: 100%;
    }
    .attach-preview img {
      width: 100%;
      display: block;
      border-radius: 14px;
      object-fit: contain;
    }

    .img-attach-box.has-image .attach-placeholder { display: none; }
    .img-attach-box.has-image .attach-preview { display: block; }

    /* change / remove buttons */
    .attach-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      justify-content: center;
    }
    .btn-attach-change {
      background: var(--navy);
      border: none;
      color: var(--gold-light);
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-attach-change:active { background: var(--navy-mid); }

    .btn-attach-remove {
      background: transparent;
      border: 1.5px solid #c8b89a;
      color: var(--text-mid);
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    .btn-attach-remove:active { border-color: #c0392b; color: #c0392b; }

    .attach-actions.hidden { display: none; }

    /* hidden file input */
    .img-input { display: none; }

    /* ── FOOTER ── */
    .footer {
      background: var(--cream);
      border-top: 1.5px solid var(--gold);
      padding: 16px 20px calc(var(--safe-bottom) + 16px);
      text-align: center;
      flex-shrink: 0;
    }
    .footer-call {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--navy);
      color: var(--gold-light);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 10px 22px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      margin-bottom: 10px;
      transition: background 0.2s;
    }
    .footer-call:active { background: var(--navy-mid); transform: scale(0.97); }
    .footer-meta { font-size: 11px; color: var(--text-light); letter-spacing: 0.4px; line-height: 1.7; }
    .footer-tax { font-size: 10px; color: #b0a08a; margin-top: 6px; letter-spacing: 0.3px; }

    /* ── SCROLL TO TOP ── */
    .scroll-top-btn {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 80px);
      right: calc((100vw - 430px) / 2 + 16px);
      width: 40px; height: 40px;
      background: var(--navy);
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      color: var(--gold-light);
      font-size: 16px;
      display: none;
      align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(26,58,92,0.35);
    }
    .scroll-top-btn.show { display: flex; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 90px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: var(--gold-light);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid var(--gold);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">



  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="header-ornament">Jakarta · Thamrin</div>
        <div class="hotel-name">Hotel Dafam Enkadeli</div>
      </div>
    </div>
    <div class="header-bottom">
      <div class="hotel-tagline">In-Room Dining Experience</div>
      <div class="room-badge">Hotel Syariah</div>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Scroll Body -->
  <div class="scroll-body" id="scrollBody">
    <div id="menuContent"></div>

    <!-- Footer -->
    <div class="footer">
      <button class="footer-call" onclick="showToast('Menghubungi ext. 0...')">
        ☎ Pesan Sekarang — ext. 0
      </button>
      <div class="footer-meta">Available 24 hours · Delivery 30–45 minutes</div>
      <div class="footer-tax">Harga sudah termasuk pajak &amp; layanan</div>
    </div>
  </div>
</div>

<!-- Scroll to Top -->
<button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const categories = [
  { id: "mains",   name: "Main Course",    emoji: "🍽" },
  { id: "snacks",  name: "Snacks",         emoji: "🍟" },
  { id: "kopi",    name: "Kopi",           emoji: "☕" },
  { id: "teh",     name: "Teh",            emoji: "🍵" },
  { id: "healthy", name: "Minuman Sehat",  emoji: "🥤" }
];

// Store image data URLs per category
const images = {};


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function scrollToTop() {
  document.getElementById('scrollBody').scrollTo({ top: 0, behavior: 'smooth' });
}

// Scroll to top button
document.getElementById('scrollBody').addEventListener('scroll', function() {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('show', this.scrollTop > 200);
});

// Switch tab & section
function switchTab(id, tabEl) {
  // tabs
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  // sections
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  // scroll body to top
  document.getElementById('scrollBody').scrollTo({ top: 0, behavior: 'smooth' });
}

// Trigger file picker
function triggerPicker(catId) {
  document.getElementById('input-' + catId).click();
}

// Handle file selection
function handleFile(catId, input) {
  const file = input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    showToast('File harus berupa gambar');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    images[catId] = e.target.result;
    renderImage(catId);
    showToast('Gambar berhasil di-attach');
  };
  reader.readAsDataURL(file);
}

// Render / update image box
function renderImage(catId) {
  const box     = document.getElementById('box-' + catId);
  const preview = document.getElementById('preview-' + catId);
  const actions = document.getElementById('actions-' + catId);
  if (images[catId]) {
    preview.querySelector('img').src = images[catId];
    box.classList.add('has-image');
    actions.classList.remove('hidden');
  } else {
    preview.querySelector('img').src = '';
    box.classList.remove('has-image');
    actions.classList.add('hidden');
  }
}

// Remove image
function removeImage(catId) {
  delete images[catId];
  document.getElementById('input-' + catId).value = '';
  renderImage(catId);
  showToast('Gambar dihapus');
}

// Build DOM
function buildUI() {
  // Tabs
  document.getElementById('catTabs').innerHTML = categories.map((c, i) =>
    `<button class="cat-tab${i===0?' active':''}" onclick="switchTab('${c.id}', this)">${c.emoji} ${c.name}</button>`
  ).join('');

  // Sections
  document.getElementById('menuContent').innerHTML = categories.map((c, i) => `
    <div class="section${i===0?' active':''}" id="sec-${c.id}">

      <div class="section-header">
        <h2 class="section-title">${c.emoji} ${c.name}</h2>
      </div>

      <div class="img-attach-wrap">

        <!-- Box -->
        <div class="img-attach-box" id="box-${c.id}" onclick="triggerPicker('${c.id}')">

          <!-- Placeholder (no image yet) -->
          <div class="attach-placeholder">
            <div class="attach-icon">🖼</div>
            <div class="attach-label">Attach Gambar Menu</div>
            <div class="attach-sublabel">${c.name}</div>
            <div class="attach-hint">Ketuk untuk pilih gambar dari galeri</div>
          </div>

          <!-- Preview (after image attached) -->
          <div class="attach-preview" id="preview-${c.id}">
            <img src="" alt="Menu ${c.name}">
          </div>

        </div>

        <!-- Action buttons (change / remove) -->
        <div class="attach-actions hidden" id="actions-${c.id}">
          <button class="btn-attach-change" onclick="triggerPicker('${c.id}')">🔄 Ganti Gambar</button>
          <button class="btn-attach-remove" onclick="removeImage('${c.id}')">✕ Hapus</button>
        </div>

      </div>

      <!-- Hidden file input -->
      <input class="img-input" type="file" accept="image/*" id="input-${c.id}"
        onchange="handleFile('${c.id}', this)">

    </div>
  `).join('');
}

buildUI();
</script>
</body>
</html>
